name: Validate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  # HACS validation is intentionally disabled until the integration ships
  # brand assets (custom_components/estfeed/brand/icon.png) or is listed in
  # the home-assistant/brands repository. Re-enable once either lands.

  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e '.[dev]' --config-settings editable_mode=compat
      - run: ruff check custom_components tests
      - run: ruff format --check custom_components tests
      - run: mypy
      - run: pytest tests --cov=custom_components/estfeed --cov-fail-under=85
